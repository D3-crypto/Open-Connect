version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: openconnect_postgres
    environment:
      POSTGRES_DB: openconnect
      POSTGRES_USER: oc_admin
      POSTGRES_PASSWORD: oc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
